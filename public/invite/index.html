<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You've been invited to Brainy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #08080F;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #111119;
      border: 1px solid rgba(124,111,255,0.28);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px; width: 100%;
      text-align: center;
      box-shadow: 0 0 60px rgba(124,111,255,0.12);
    }
    .logo { font-size: 20px; font-weight: 900; color: #A89FFF; margin-bottom: 32px; letter-spacing: -0.5px; }
    h1 { font-size: 26px; font-weight: 800; color: #F0F0FF; margin-bottom: 12px; letter-spacing: -0.5px; }
    p { color: #9898B8; font-size: 15px; line-height: 1.65; margin-bottom: 28px; }
    .code-box {
      background: rgba(124,111,255,0.1);
      border: 1px solid rgba(124,111,255,0.28);
      border-radius: 14px; padding: 20px;
      margin-bottom: 28px; display: none;
    }
    .code-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: #7C6FFF; text-transform: uppercase; margin-bottom: 10px; }
    .code { font-size: 34px; font-weight: 900; letter-spacing: 8px; color: #F0F0FF; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: #7C6FFF; color: #fff;
      padding: 16px; border-radius: 14px; text-decoration: none;
      font-size: 15px; font-weight: 700;
      box-shadow: 0 0 32px rgba(124,111,255,0.35);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-2px); }
    .back { display: block; margin-top: 20px; color: #5A5A78; font-size: 13px; text-decoration: none; transition: color 0.2s; }
    .back:hover { color: #9898B8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Brainy</div>
    <h1>You've been invited!</h1>
    <p>Your friend shared Brainy with you. Download the app, create an account, and enter the code below to both earn bonus XP.</p>

    <div class="code-box" id="codeBox">
      <div class="code-label">Your referral code</div>
      <div class="code" id="referralCode"></div>
    </div>

    <a href="https://apps.apple.com/app/id000000000" class="btn" id="storeBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      Download on App Store
    </a>
    <a href="/" class="back">Learn more about Brainy →</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ref = params.get('ref');
    if (ref) {
      document.getElementById('referralCode').textContent = ref.toUpperCase();
      document.getElementById('codeBox').style.display = 'block';
    }
  </script>
</body>
</html>
